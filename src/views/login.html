<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitalizacion Notarias</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">


    <style>
        :root {
            --color-bg: #0b0f19;
            --color-tarjeta: #121826;
            --color-tarjeta-borde: #1e293b;
            --color-primario: #3a6ac9;
            --color-primario-brillo: rgba(58, 106, 201, 0.15);
            --color-texto: #f8fafc;
            --color-texto-secundario: #94a3b8;
            --color-peligro: #ea5455;
            --tipografia: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-texto);
            font-family: var(--tipografia);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Tarjeta de Login */
        .tarjeta-login {
            background-color: var(--color-tarjeta);
            border: 1px solid var(--color-tarjeta-borde);
            width: 100%;
            height: 100%;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .login-cabecera {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .login-marca {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .login-marca h2 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #f8fafc 30%, #3a6ac9 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-opciones {
            background: transparent;
            border: 1px solid var(--color-tarjeta-borde);
            color: var(--color-texto-secundario);
            border-radius: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }

        .btn-opciones:hover {
            border-color: var(--color-primario);
            color: var(--color-texto);
        }

        /* Formulario */
        .formulario-campos {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
            justify-content: center;
        }

        .campo-grupo {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .campo-grupo label {
            font-size: 11px;
            font-weight: 600;
            color: var(--color-texto-secundario);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .campo-input {
            width: 100%;
            height: 42px;
            background-color: var(--color-bg);
            border: 1px solid var(--color-tarjeta-borde);
            border-radius: 8px;
            color: var(--color-texto);
            padding: 0 14px;
            font-family: var(--tipografia);
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .campo-input:focus {
            outline: none;
            border-color: var(--color-primario);
            box-shadow: 0 0 0 2px var(--color-primario-brillo);
        }

        .btn-iniciar {
            width: 100%;
            height: 44px;
            background-color: var(--color-primario);
            border: 1px solid var(--color-primario);
            color: white;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14.5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s;
            margin-top: 10px;
        }

        .btn-iniciar:hover {
            opacity: 0.9;
        }

        .error-mensaje {
            color: var(--color-peligro);
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            min-height: 18px;
        }

        /* MODAL DE CONFIGURACIÓN (Opciones) */
        .modal-config {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--color-tarjeta);
            z-index: 10;
            padding: 25px;
            display: none; /* Oculto por defecto */
            flex-direction: column;
            justify-content: space-between;
        }

        .modal-cabecera {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--color-tarjeta-borde);
            padding-bottom: 12px;
            margin-bottom: 15px;
        }

        .modal-cabecera h3 {
            font-size: 15px;
            font-weight: 700;
            color: var(--color-texto);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .control-select {
            width: 100%;
            height: 38px;
            background-color: var(--color-bg);
            border: 1px solid var(--color-tarjeta-borde);
            border-radius: 8px;
            color: var(--color-texto);
            padding: 0 10px;
            font-family: var(--tipografia);
            font-size: 13px;
        }

        .control-select:focus {
            outline: none;
            border-color: var(--color-primario);
        }
    </style>
</head>
<body>

    <div class="tarjeta-login">
        <!-- Cabecera -->
        <div class="login-cabecera">
            <div class="login-marca">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="color: var(--color-primario); vertical-align: middle; margin-right: 6px;"><path d="M12 2l8 3v6c0 5.55-3.84 10.74-9 12-5.16-1.26-9-6.45-9-12V5l8-3zm0 4a3 3 0 0 0-3 3c0 1.66 1.34 3 3 3s3-1.34 3-3a3 3 0 0 0-3-3zm0 8.2c-2 0-6 1.09-6 3.08v.8h12v-.8c0-1.99-4-3.08-6-3.08z"/></svg>
                <h2>Digitalizacion Notarías</h2>
            </div>
            <button id="btnAbrirConfig" class="btn-opciones" title="Configuración de PC">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="vertical-align: middle;"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5.-38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-.36 2.54c-.59-.24-1.13-.56-1.62-.94l2.39.96c.22.08.47.01.59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.03-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
            </button>
        </div>

        <!-- Formulario de Login -->
        <div class="formulario-campos">
            <div class="campo-grupo">
                <label for="txtUsuario">Usuario</label>
                <input type="text" id="txtUsuario" class="campo-input" placeholder="Nombre de capturista" autofocus>
            </div>
            <div class="campo-grupo" style="margin-top: 5px;">
                <label for="txtPin">PIN de Acceso</label>
                <input type="password" id="txtPin" class="campo-input" placeholder="••••" maxlength="8">
            </div>

            <div id="lblError" class="error-mensaje"></div>

            <button id="btnIniciarSesion" class="btn-iniciar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="vertical-align: middle; margin-right: 6px;"><path d="M10 17v-3H3v-4h7V7l5 5-5 5m11-13h-9a2 2 0 0 0-2 2v2h2V5h9v14h-9v-3h-2v2a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"/></svg>
                Iniciar Sesión
            </button>
        </div>

        <!-- MODAL DE CONFIGURACIÓN -->
        <div id="modalConfig" class="modal-config">
            <div>
                <div class="modal-cabecera">
                    <h3><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="color: var(--color-primario); vertical-align: middle; margin-right: 6px;"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5.-38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-.36 2.54c-.59-.24-1.13-.56-1.62-.94l2.39.96c.22.08.47.01.59-.22l1.92-3.32a.49.49 0 0 0-.12-.61l-2.03-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg> Opciones Generales</h3>
                    <button id="btnCerrarConfig" class="btn-opciones" style="width: 28px; height: 28px; border:none;" title="Volver al Login">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="vertical-align: middle;"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"/></svg>
                    </button>
                </div>

                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <div class="campo-grupo">
                        <label for="txtServidor">Ruta del Servidor Local (UNC)</label>
                        <input type="text" id="txtServidor" class="campo-input" style="height:36px; font-size:12.5px;" placeholder="Ej. \\192.168.1.10\NOTARIAS">
                    </div>

                    <div style="display: flex; gap: 10px;">
                        <div class="campo-grupo" style="flex: 1;">
                            <label for="txtPC">Identificación PC</label>
                            <input type="text" id="txtPC" class="campo-input" style="height:36px;" placeholder="Ej. PC-01">
                        </div>
                        <div class="campo-grupo" style="flex: 1.2;">
                            <label for="cboLugar">Lugar de Trabajo</label>
                            <select id="cboLugar" class="control-select">
                                <option value="5 de mayo - 1">5 de mayo - 1</option>
                                <option value="5 de mayo - 2">5 de mayo - 2</option>
                                <option value="IREC">IREC</option>
                                <option value="RPP">RPP</option>
                            </select>
                        </div>
                    </div>

                    <div class="campo-grupo">
                        <label for="cboTipo">Tipo de Captura</label>
                        <select id="cboTipo" class="control-select">
                            <option value="NOTARIAS">NOTARIAS</option>
                            <option value="LIBROS">LIBROS</option>
                            <option value="NOMINAS">NOMINAS</option>
                        </select>
                    </div>
                </div>
            </div>

            <button id="btnGuardarConfig" class="btn-iniciar" style="height: 38px; font-size: 13.5px; background-color: var(--color-primario); border-color: var(--color-primario);">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="vertical-align: middle; margin-right: 6px;"><path d="M15 9H5V5h10m-3 14a3 3 0 0 1-3-3 3 3 0 0 1 3-3 3 3 0 0 1 3 3 3 3 0 0 1-3 3m5-16H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-4-4z"/></svg>
                Guardar Cambios
            </button>
        </div>
    </div>

    <!-- Cargar Lógica del Login -->
    <script src="login.js"></script>
</body>
</html>
