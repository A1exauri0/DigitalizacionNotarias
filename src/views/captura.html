<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitalizacion Notarias</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">


    <style>
        :root {
            --color-bg: #0b0f19;
            --color-tarjeta: #121826;
            --color-tarjeta-borde: #1e293b;
            --color-primario: #3a6ac9;
            --color-primario-brillo: rgba(58, 106, 201, 0.15);
            --color-exito: #2ebd75;
            --color-peligro: #ea5455;
            --color-texto: #f8fafc;
            --color-texto-secundario: #94a3b8;
            --tipografia: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-texto);
            font-family: var(--tipografia);
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--color-tarjeta-borde);
            border-radius: 12px;
        }

        .widget-contenedor {
            background-color: var(--color-tarjeta);
            width: 100%;
            height: 100%;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Cabecera Arrastrable */
        .widget-cabecera {
            display: flex;
            justify-content: space-between;
            align-items: center;
            -webkit-app-region: drag; /* Permite arrastrar la ventana */
            border-bottom: 1px solid var(--color-tarjeta-borde);
            padding-bottom: 8px;
        }

        .usuario-info {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .usuario-info h4 {
            font-size: 13.5px;
            font-weight: 700;
            color: var(--color-texto);
            max-width: 190px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-cerrar-sesion {
            background-color: rgba(234, 84, 85, 0.1);
            border: 1px solid rgba(234, 84, 85, 0.2);
            color: var(--color-peligro);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            -webkit-app-region: no-drag; /* Evita conflicto de arrastre */
            transition: background-color 0.2s;
        }

        .btn-cerrar-sesion:hover {
            background-color: rgba(234, 84, 85, 0.2);
        }

        /* Sección de Ruta */
        .seccion-ruta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--color-bg);
            border: 1px solid var(--color-tarjeta-borde);
            border-radius: 8px;
            padding: 6px 10px;
            margin: 10px 0;
        }

        .lbl-ruta {
            font-size: 11.5px;
            color: var(--color-texto-secundario);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 250px;
        }

        .btn-carpeta {
            background: transparent;
            border: none;
            color: var(--color-primario);
            cursor: pointer;
            display: flex;
            align-items: center;
            font-size: 18px;
            transition: transform 0.1s;
        }

        .btn-carpeta:hover {
            transform: scale(1.1);
        }

        /* Estatus inferior y Contador */
        .widget-inferior {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .estatus-watcher {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            color: var(--color-exito);
        }

        .estatus-watcher.inactivo {
            color: var(--color-peligro);
        }

        .luz-pulso {
            width: 8px;
            height: 8px;
            border-radius: 99px;
            background-color: var(--color-exito);
            box-shadow: 0 0 8px var(--color-exito);
            animation: pulse 1.5s infinite;
        }

        .estatus-watcher.inactivo .luz-pulso {
            background-color: var(--color-peligro);
            box-shadow: 0 0 8px var(--color-peligro);
        }

        .contador-sesion {
            font-size: 12px;
            font-weight: 700;
            background-color: var(--color-primario-brillo);
            border: 1px solid rgba(58, 106, 201, 0.3);
            color: var(--color-texto);
            padding: 3px 8px;
            border-radius: 6px;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.9);
                opacity: 0.6;
            }
            50% {
                transform: scale(1.1);
                opacity: 1;
            }
            100% {
                transform: scale(0.9);
                opacity: 0.6;
            }
        }
    </style>
</head>
<body>

    <div class="widget-contenedor">
        <!-- Fila 1: Cabecera -->
        <div class="widget-cabecera">
            <div class="usuario-info">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="color: var(--color-primario); vertical-align: middle;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
                <h4 id="lblUsuario">Cargando...</h4>
            </div>
            <button id="btnCerrarSesion" class="btn-cerrar-sesion">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="vertical-align: middle; margin-right: 4px;"><path d="M14.08 15.59L16.67 13H7v-2h9.67l-2.59-2.59L15.5 7l5 5-5 5-1.42-1.41M19 3a2 2 0 0 1 2 2v2h-2V5H5v14h14v-2h2v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14z"/></svg>
                Salir
            </button>
        </div>

        <!-- Fila 2: Carpeta de Trabajo -->
        <div class="seccion-ruta">
            <span id="lblRuta" class="lbl-ruta">Ruta: Selecciona carpeta de trabajo</span>
            <button id="btnCambiarRuta" class="btn-carpeta" title="Cambiar Carpeta de Trabajo">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="vertical-align: middle;"><path d="M19 17H5V7h14m0-2H5c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2m-8-2h-3l-2-2H3v2h5l2 2h9V3h-6z"/></svg>
            </button>
        </div>

        <!-- Fila 3: Estatus y Contador -->
        <div class="widget-inferior">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div id="wrapperEstatus" class="estatus-watcher">
                    <div class="luz-pulso"></div>
                    <span id="lblEstatus">Vigilando</span>
                </div>
                <span id="lblRed" style="font-size: 11px; font-weight: 600; color: var(--color-exito); display: flex; align-items: center; gap: 3px;">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" style="vertical-align: middle; margin-right: 2px;"><path d="M12 21l-12-12c2.4-2.4 5.7-3.9 9.3-3.9 3.6 0 6.9 1.5 9.3 3.9l-12 12zm0-16.5c-2.3 0-4.4.9-6 2.5l6 6 6-6c-1.6-1.6-3.7-2.5-6-2.5z"/></svg>
                    <span>Online</span>
                </span>
            </div>
            <div id="lblContador" class="contador-sesion">Capturados: 0</div>
        </div>
    </div>

    <!-- Cargar Lógica del Widget -->
    <script src="captura.js"></script>
</body>
</html>
